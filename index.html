<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap POS System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout Structure */
        .pos-layout {
            height: calc(100vh - 64px); /* Subtract navbar height */
        }
        
        .products-area {
            height: 100%;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        
        .cart-sidebar {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-left: 1px solid #dee2e6;
            box-shadow: -4px 0 15px rgba(0,0,0,0.03);
        }

        .cart-items-container {
            flex-grow: 1;
            overflow-y: auto;
        }

        /* Product Cards */
        .product-card {
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #eee;
            border-radius: 16px;
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border-color: #0d6efd;
        }

        .product-card:active {
            transform: translateY(0);
        }

        .product-icon-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 2rem;
        }

        /* Custom Scrollbar for Webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* Cart Item Styling */
        .cart-item {
            border-bottom: 1px dashed #eee;
        }
        
        .quantity-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-2 shadow-sm" style="height: 64px;">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="#">
                <i class="bi bi-cart3 fs-4 me-2"></i> Boot POS
            </a>
            
            <div class="d-none d-md-block w-50 px-4">
                <div class="input-group">
                    <span class="input-group-text bg-light border-0 text-muted rounded-start-pill px-3">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control bg-light border-0 rounded-end-pill" placeholder="Search products..." onkeyup="filterProducts()">
                </div>
            </div>

            <div class="d-flex align-items-center text-secondary">
                <span class="me-4 fw-medium d-none d-md-inline" id="clock">00:00:00</span>
                <div class="d-flex align-items-center bg-light rounded-pill px-3 py-1">
                    <i class="bi bi-person-circle fs-5 me-2"></i>
                    <span class="fw-medium">Cashier 1</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid px-0">
        <div class="row g-0 pos-layout flex-column flex-lg-row">
            
            <!-- Left Side: Products -->
            <div class="col-lg-8 col-xl-9 products-area bg-light">
                <!-- Categories -->
                <div class="bg-white border-bottom p-3 sticky-top z-1">
                    <div class="d-flex gap-2 overflow-auto" id="categoryContainer">
                        <!-- Categories injected here -->
                    </div>
                </div>

                <!-- Product Grid -->
                <div class="p-4">
                    <div class="row g-4" id="productsGrid">
                        <!-- Products injected here -->
                    </div>
                    <div id="noProductsMessage" class="text-center text-muted py-5 d-none">
                        <i class="bi bi-search" style="font-size: 3rem; opacity: 0.5;"></i>
                        <h4 class="mt-3">No products found</h4>
                    </div>
                </div>
            </div>

            <!-- Right Side: Cart -->
            <div class="col-lg-4 col-xl-3 cart-sidebar z-2">
                <!-- Cart Header -->
                <div class="p-3 bg-light border-bottom d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-0 fw-bold text-dark">Current Order</h5>
                        <small class="text-muted" id="cartItemCount">0 Items</small>
                    </div>
                    <button class="btn btn-outline-danger btn-sm rounded-3" onclick="clearCart()" title="Clear Order">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>

                <!-- Cart Items -->
                <div class="cart-items-container p-3" id="cartItemsContainer">
                    <div class="h-100 d-flex flex-column align-items-center justify-content-center text-muted opacity-50">
                        <i class="bi bi-cart-x" style="font-size: 4rem;"></i>
                        <p class="mt-2 fw-medium">Cart is empty</p>
                    </div>
                </div>

                <!-- Cart Footer (Totals) -->
                <div class="bg-light p-4 border-top">
                    <div class="d-flex justify-content-between mb-2 text-secondary">
                        <span>Subtotal</span>
                        <span id="subtotalAmount">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-secondary">
                        <span>Tax (8%)</span>
                        <span id="taxAmount">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-end mb-4 border-top pt-3">
                        <span class="fs-5 fw-bold text-dark">Total</span>
                        <span class="fs-2 fw-black text-primary lh-1" id="totalAmount">$0.00</span>
                    </div>
                    
                    <button id="checkoutBtn" class="btn btn-primary btn-lg w-100 py-3 rounded-4 fw-bold shadow-sm" disabled onclick="showCheckout()">
                        <i class="bi bi-credit-card me-2"></i> Pay Now
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-primary text-white border-0 rounded-top-4 py-4 d-flex flex-column align-items-center position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    <div class="bg-white rounded-circle p-3 mb-3 shadow-sm">
                        <i class="bi bi-credit-card-2-front text-primary fs-1"></i>
                    </div>
                    <h4 class="modal-title fw-bold">Payment Method</h4>
                    <p class="mb-0 text-white-50">Complete your transaction</p>
                </div>
                <div class="modal-body p-4">
                    <h2 class="text-center text-primary fw-bold mb-4" id="modalTotalAmount">$0.00</h2>
                    
                    <div class="d-grid gap-3">
                        <button class="btn btn-outline-primary btn-lg rounded-3 text-start p-3 d-flex align-items-center" onclick="completePayment('Card')">
                            <i class="bi bi-credit-card fs-3 me-3"></i>
                            <div>
                                <div class="fw-bold">Credit / Debit Card</div>
                                <small class="text-muted">Tap to pay or insert card</small>
                            </div>
                        </button>
                        
                        <button class="btn btn-outline-success btn-lg rounded-3 text-start p-3 d-flex align-items-center" onclick="completePayment('Cash')">
                            <i class="bi bi-cash-stack fs-3 me-3"></i>
                            <div>
                                <div class="fw-bold">Cash</div>
                                <small class="text-muted">Receive cash from customer</small>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 rounded-4 text-center p-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h4 class="mt-3 fw-bold">Payment Successful!</h4>
                <p class="text-muted">The order has been completed.</p>
                <button class="btn btn-success rounded-pill mt-2" data-bs-dismiss="modal">New Order</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App Logic -->
    <script>
        // --- DATA ---
        const TAX_RATE = 0.08;
        const categories = ['All', 'Drinks', 'Hot Food', 'Desserts', 'Snacks'];
        
        const products = [
            { id: 1, name: 'Espresso', price: 3.50, category: 'Drinks', icon: 'bi-cup-hot', color: 'text-warning', bg: 'bg-warning bg-opacity-10' },
            { id: 2, name: 'Cappuccino', price: 4.50, category: 'Drinks', icon: 'bi-cup-hot-fill', color: 'text-warning', bg: 'bg-warning bg-opacity-10' },
            { id: 3, name: 'Iced Latte', price: 5.00, category: 'Drinks', icon: 'bi-cup-straw', color: 'text-info', bg: 'bg-info bg-opacity-10' },
            { id: 4, name: 'Matcha Tea', price: 5.50, category: 'Drinks', icon: 'bi-cup', color: 'text-success', bg: 'bg-success bg-opacity-10' },
            { id: 5, name: 'Margherita Pizza', price: 12.00, category: 'Hot Food', icon: 'bi-pie-chart-fill', color: 'text-danger', bg: 'bg-danger bg-opacity-10' },
            { id: 6, name: 'Pepperoni Pizza', price: 14.00, category: 'Hot Food', icon: 'bi-pie-chart', color: 'text-danger', bg: 'bg-danger bg-opacity-10' },
            { id: 7, name: 'Cheeseburger', price: 9.50, category: 'Hot Food', icon: 'bi-egg-fried', color: 'text-warning', bg: 'bg-warning bg-opacity-10' },
            { id: 8, name: 'French Fries', price: 4.00, category: 'Hot Food', icon: 'bi-basket', color: 'text-warning', bg: 'bg-warning bg-opacity-10' },
            { id: 9, name: 'Chocolate Cake', price: 6.50, category: 'Desserts', icon: 'bi-cake2', color: 'text-primary', bg: 'bg-primary bg-opacity-10' },
            { id: 10, name: 'Ice Cream', price: 4.50, category: 'Desserts', icon: 'bi-snow', color: 'text-info', bg: 'bg-info bg-opacity-10' },
            { id: 11, name: 'Blueberry Muffin', price: 3.75, category: 'Snacks', icon: 'bi-egg', color: 'text-secondary', bg: 'bg-secondary bg-opacity-10' },
            { id: 12, name: 'Potato Chips', price: 2.50, category: 'Snacks', icon: 'bi-box-seam', color: 'text-secondary', bg: 'bg-secondary bg-opacity-10' },
        ];

        // --- STATE ---
        let cart = [];
        let activeCategory = 'All';
        
        // Modals
        let checkoutModalInstance;
        let successModalInstance;

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            checkoutModalInstance = new bootstrap.Modal(document.getElementById('checkoutModal'));
            successModalInstance = new bootstrap.Modal(document.getElementById('successModal'));
            
            initClock();
            renderCategories();
            renderProducts();
            renderCart();
        });

        // --- CORE FUNCTIONS ---

        function formatMoney(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = categories.map(cat => `
                <button 
                    onclick="setCategory('${cat}')" 
                    class="btn rounded-pill px-4 fw-medium text-nowrap ${activeCategory === cat ? 'btn-primary shadow-sm' : 'btn-outline-secondary border-0 bg-white shadow-sm'}"
                >
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(category) {
            activeCategory = category;
            renderCategories(); // Re-render to update active state
            renderProducts();   // Re-render products based on filter
        }

        function filterProducts() {
            renderProducts();
        }

        function renderProducts() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('productsGrid');
            const noMsg = document.getElementById('noProductsMessage');
            
            const filtered = products.filter(p => {
                const matchCategory = activeCategory === 'All' || p.category === activeCategory;
                const matchSearch = p.name.toLowerCase().includes(searchQuery);
                return matchCategory && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noMsg.classList.remove('d-none');
            } else {
                noMsg.classList.add('d-none');
                grid.innerHTML = filtered.map(p => `
                    <div class="col-6 col-md-4 col-xxl-3">
                        <div class="card product-card h-100 p-3 text-center" onclick="addToCart(${p.id})">
                            <div class="product-icon-wrapper ${p.bg}">
                                <i class="bi ${p.icon} ${p.color}"></i>
                            </div>
                            <h6 class="card-title fw-bold text-dark mb-1 text-truncate">${p.name}</h6>
                            <p class="card-text text-primary fw-bold mb-0">${formatMoney(p.price)}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.product.id === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ product: product, quantity: 1 });
            }
            renderCart();
        }

        function updateQuantity(productId, delta) {
            const itemIndex = cart.findIndex(item => item.product.id === productId);
            if (itemIndex > -1) {
                cart[itemIndex].quantity += delta;
                
                // Remove if quantity is 0 or less
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
            }
            renderCart();
        }

        function clearCart() {
            if (cart.length === 0) return;
            // Native confirm dialog for simplicity
            if (confirm('Are you sure you want to clear the current order?')) {
                cart = [];
                renderCart();
            }
        }

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            const itemCountEl = document.getElementById('cartItemCount');
            const subtotalEl = document.getElementById('subtotalAmount');
            const taxEl = document.getElementById('taxAmount');
            const totalEl = document.getElementById('totalAmount');
            const checkoutBtn = document.getElementById('checkoutBtn');

            // Calculate totals
            let subtotal = 0;
            let totalItems = 0;
            
            cart.forEach(item => {
                subtotal += item.product.price * item.quantity;
                totalItems += item.quantity;
            });

            const tax = subtotal * TAX_RATE;
            const total = subtotal + tax;

            // Update DOM text
            itemCountEl.innerText = `${totalItems} Item${totalItems !== 1 ? 's' : ''}`;
            subtotalEl.innerText = formatMoney(subtotal);
            taxEl.innerText = formatMoney(tax);
            totalEl.innerText = formatMoney(total);
            
            // Enable/Disable Checkout Button
            checkoutBtn.disabled = cart.length === 0;

            // Render Items
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-100 d-flex flex-column align-items-center justify-content-center text-muted opacity-50">
                        <i class="bi bi-cart-x" style="font-size: 4rem;"></i>
                        <p class="mt-2 fw-medium">Cart is empty</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item py-3 d-flex align-items-center justify-content-between">
                    <div class="pe-3 flex-grow-1 overflow-hidden">
                        <div class="fw-bold text-dark text-truncate" style="font-size: 0.95rem;">${item.product.name}</div>
                        <div class="text-primary fw-medium small">${formatMoney(item.product.price)}</div>
                    </div>
                    
                    <div class="d-flex align-items-center bg-light rounded-3 p-1 border">
                        <button class="btn btn-light quantity-btn text-secondary" onclick="updateQuantity(${item.product.id}, -1)">
                            <i class="bi ${item.quantity === 1 ? 'bi-trash text-danger' : 'bi-dash'}"></i>
                        </button>
                        <span class="fw-bold px-2 text-center" style="min-width: 32px;">${item.quantity}</span>
                        <button class="btn btn-light quantity-btn text-secondary" onclick="updateQuantity(${item.product.id}, 1)">
                            <i class="bi bi-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- CHECKOUT LOGIC ---
        
        function showCheckout() {
            if (cart.length === 0) return;
            
            // Calculate total again to be safe
            const subtotal = cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            const total = subtotal + (subtotal * TAX_RATE);
            
            document.getElementById('modalTotalAmount').innerText = formatMoney(total);
            checkoutModalInstance.show();
        }

        function completePayment(method) {
            checkoutModalInstance.hide();
            
            // Clear cart and show success
            cart = [];
            renderCart();
            
            setTimeout(() => {
                successModalInstance.show();
            }, 300); // Small delay to allow checkout modal to close smoothly
        }

        // --- UTILS ---
        
        function initClock() {
            const clockEl = document.getElementById('clock');
            setInterval(() => {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }, 1000);
        }

    </script>
</body>
</html>
